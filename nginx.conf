server {
    listen 80;
    server_name yourdomain.com;  # 替换为你的域名

    # 前端静态文件
    root /usr/share/nginx/html;
    index index.html;

    # SPA 回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 代理
    location /haibao-api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;  # AI 生成可能耗时较长
        client_max_body_size 20m;
    }

    # MiMo API 代理（aiAssistant 插件，已弃用但保留兼容）
    location /mimo-api/ {
        proxy_pass https://token-plan-cn.xiaomimimo.com/;
        proxy_set_header Host token-plan-cn.xiaomimimo.com;
        proxy_ssl_server_name on;
        proxy_read_timeout 120s;
    }

    # 上传文件缓存
    location /haibao-api/uploads/ {
        proxy_pass http://127.0.0.1:3001/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 健康检查
    location /haibao-api/health {
        proxy_pass http://127.0.0.1:3001/health;
    }
}
